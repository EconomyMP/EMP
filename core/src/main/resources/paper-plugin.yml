name: EMP
version: '${version}'
main: github.nighter.smartspawner.SmartSpawner
api-version: '1.21'
description: "EMP (Economy Multiplayer) - spawner-driven SMP economy and progression"
authors: [ https://github.com/NighterDevelopment/SmartSpawner ]
website: "https://nighterdevelopment.github.io/SmartSpawner/"
folia-supported: true

# Load order - POSTWORLD means after all worlds are loaded
load: POSTWORLD

# Prefix for logging messages
prefix: "EMP"

# Dependencies
dependencies:
  server:
    # Bedrock Support Plugins
    floodgate:
      load: BEFORE
      required: false
      join-classpath: true
    Geyser-Spigot:
      load: BEFORE
      required: false
      join-classpath: true
    # Shop Plugins
    EconomyShopGUI:
      load: AFTER
      required: false
      join-classpath: true
    EconomyShopGUI-Premium:
      load: AFTER
      required: false
      join-classpath: true
    ShopGUIPlus:
      load: BEFORE
      required: false
      join-classpath: true
    zShop:
      load: BEFORE
      required: false
      join-classpath: true
    ExcellentShop:
      load: BEFORE
      required: false
      join-classpath: true

    # Economy Plugins
    CoinsEngine:
      load: BEFORE
      required: false
      join-classpath: true
    Vault:
      load: BEFORE
      required: false
      join-classpath: true

    # Protection/Region Plugins
    WorldGuard:
      load: BEFORE
      required: false
      join-classpath: true
    GriefPrevention:
      load: BEFORE
      required: false
      join-classpath: true
    Lands:
      load: BEFORE
      required: false
      join-classpath: true
    Towny:
      load: BEFORE
      required: false
      join-classpath: true
    SimpleClaimSystem:
      load: BEFORE
      required: false
      join-classpath: true
    minePlots:
      load: BEFORE
      required: false
      join-classpath: true
    Residence:
      load: BEFORE
      required: false
      join-classpath: true
    HuskClaims:
      load: BEFORE
      required: false
      join-classpath: true

    # World Management Plugins
    Multiverse-Core:
      load: BEFORE
      required: false
      join-classpath: true
    MultiWorld:
      load: BEFORE
      required: false
      join-classpath: true
    Worlds:
      load: BEFORE
      required: false
      join-classpath: true
    SuperiorSkyblock2:
      load: BEFORE
      required: false
      join-classpath: true
    BentoBox:
      load: BEFORE
      required: false
      join-classpath: true
    IridiumSkyblock:
      load: BEFORE
      required: false
      join-classpath: true
    PlotSquared:
      load: BEFORE
      required: false
      join-classpath: true

    # RPG/Skill Plugins
    AuraSkills:
      load: BEFORE
      required: false
      join-classpath: true

    # Drops Plugins
    MythicMobs:
      load: BEFORE
      required: false
      join-classpath: true

commands:
  smartspawner:
    description: Main command for EMP spawner systems
    usage: /smartspawner [reload|give|list|hologram|prices|clear|near] [args...]
    aliases: [ ss, spawner ]
    permission: smartspawner.command.use
    permission-message: "You don't have permission to use EMP spawner commands!"

  bal:
    description: View your balance or another player's balance
    usage: /bal [player]
    aliases: [ balance ]
    permission: emp.command.bal

  pay:
    description: Pay another player money
    usage: /pay <player> <amount>
    permission: emp.command.pay

  baltop:
    description: View the top money balances
    usage: /baltop [page]
    permission: emp.command.baltop

  eco:
    description: Economy admin commands
    usage: /eco <give|take|set> <player> <amount>
    permission: emp.command.eco

  gems:
    description: View and manage gem balances
    usage: /gems [pay|give|take] <player> <amount>
    permission: emp.command.gems

  shop:
    description: Open EMP shop
    usage: /shop
    permission: emp.command.shop

  spawnershop:
    description: Open EMP spawner shop
    usage: /spawnershop
    permission: emp.command.spawnershop

  spawnerupgrades:
    description: Open upgrades for the spawner you are looking at
    usage: /spawnerupgrades
    permission: emp.command.spawnerupgrades

  tpa:
    description: Send a teleport request
    usage: /tpa <player>
    permission: emp.command.tpa

  tpaccept:
    description: Accept the last teleport request
    usage: /tpaccept
    permission: emp.command.tpa

  tpdeny:
    description: Deny the last teleport request
    usage: /tpdeny
    permission: emp.command.tpa

  tpcancel:
    description: Cancel your outgoing teleport request
    usage: /tpcancel
    permission: emp.command.tpa

  team:
    description: Team management command
    usage: /team <create|invite|accept|leave|disband|info>
    permission: emp.command.team

  bounty:
    description: Manage bounties
    usage: /bounty [add|top]
    permission: emp.command.bounty

  streak:
    description: View killstreaks
    usage: /streak [top]
    permission: emp.command.streak

  ah:
    description: Open and manage the auction house
    usage: /ah [list|sell|buy|cancel]
    permission: emp.command.ah

  rank:
    description: View your current rank
    usage: /rank
    permission: emp.command.rank

  mfg:
    description: Manufacturing and business system
    usage: /mfg [register|add|search|shop|order|orders|deliver|inventory]
    permission: emp.command.mfg

# Permissions
permissions:
  # Main command permission
  smartspawner.command.use:
    description: "Allow access to SmartSpawner commands"
    default: op

  # Subcommand permissions
  smartspawner.command.reload:
    description: "Permission to reload SmartSpawner plugin"
    default: op

  smartspawner.command.give:
    description: "Allow giving spawners to yourself"
    default: op

  smartspawner.command.list:
    description: "Allow viewing list of spawners and teleporting to them"
    default: op

  smartspawner.command.hologram:
    description: "Allow toggling hologram for spawners"
    default: op

  smartspawner.command.prices:
    description: "Allow viewing sell prices of spawner items"
    default: true

  smartspawner.command.clear:
    description: "Allow clearing holograms and ghost spawners"
    default: op

  smartspawner.command.near:
    description: "Allow highlighting nearby spawners through walls"
    default: op

  # Feature permissions
  smartspawner.changetype:
    description: "Allow changing spawner type with spawn egg"
    default: op

  smartspawner.stack:
    description: "Allow stacking spawners"
    default: true

  smartspawner.break:
    description: "Allow breaking spawners"
    default: true

  smartspawner.sellall:
    description: "Allow selling items in spawner storage GUI"
    default: true

  emp.command.balance:
    description: "Allow using balance commands"
    default: true

  emp.command.pay:
    description: "Allow using pay command"
    default: true

  emp.command.baltop:
    description: "Allow using baltop command"
    default: true

  emp.command.eco:
    description: "Allow using economy admin command"
    default: op

  emp.command.gems:
    description: "Allow using gems command"
    default: true

  emp.command.gems.admin:
    description: "Allow admin gem commands"
    default: op

  emp.command.shop:
    description: "Allow opening shop GUI"
    default: true

  emp.command.spawnershop:
    description: "Allow opening spawner shop GUI"
    default: true

  emp.command.spawnerupgrades:
    description: "Allow opening spawner upgrade GUI"
    default: true

  emp.command.tpa:
    description: "Allow using TPA commands"
    default: true

  emp.command.team:
    description: "Allow using team commands"
    default: true

  emp.command.bounty:
    description: "Allow using bounty commands"
    default: true

  emp.command.streak:
    description: "Allow viewing killstreak commands"
    default: true

  emp.command.ah:
    description: "Allow using auction house commands"
    default: true

  emp.command.rank:
    description: "Allow using rank commands"
    default: true

  emp.command.mfg:
    description: "Allow using manufacturing commands"
    default: true
