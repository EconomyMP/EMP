name: Auto Version + Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-and-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semantic version
        id: semver
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo 'v0.0.0')
          CURRENT=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$LAST_TAG" = "v0.0.0" ]; then
            HISTORY=$(git log --format='%s%n%b')
          else
            HISTORY=$(git log "${LAST_TAG}..HEAD" --format='%s%n%b')
          fi

          BUMP=patch
          if echo "$HISTORY" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\(.+\))?!:'; then
            BUMP=major
          elif echo "$HISTORY" | grep -Eq '^feat(\(.+\))?:'; then
            BUMP=minor
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Calculated next version: $NEW_VERSION ($BUMP from $LAST_TAG)"

      - name: Update build.gradle.kts version
        run: |
          set -euo pipefail
          sed -i -E 's/^\s*version\s*=\s*"[^"]+"/    version = "${{ steps.semver.outputs.version }}"/' build.gradle.kts

      - name: Commit version bump and push tag
        run: |
          set -euo pipefail
          TAG="${{ steps.semver.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
            exit 0
          fi

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add build.gradle.kts
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main "$TAG"

          echo "Pushed version bump and tag: $TAG"
